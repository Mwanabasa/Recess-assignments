
<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Log In</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
		<style>
			body { background:#f8f9fa; }
			.card { max-width:420px; margin:60px auto; }
		</style>
	</head>
	<body>
		<div class="card shadow-sm">
			<div class="card-body">
				<h4 class="card-title mb-3 text-center">Sign in to your account</h4>

				{% with messages = get_flashed_messages(with_categories=true) %}
					{% if messages %}
						<div class="mb-3">
							{% for category, msg in messages %}
								<div class="alert alert-{{ category }} alert-sm">{{ msg }}</div>
							{% endfor %}
						</div>
					{% endif %}
				{% endwith %}

				<form action="{{ url_for('login') }}" method="post">
					{{ csrf_token() if csrf_token is defined }}
					<div class="mb-3">
						<label for="email" class="form-label">Email address</label>
						<input type="email" class="form-control" id="email" name="email" required autofocus>
					</div>
					<div class="mb-3">
						<label for="password" class="form-label">Password</label>
						<input type="password" class="form-control" id="password" name="password" required>
					</div>
					<div class="mb-3 form-check">
						<input type="checkbox" class="form-check-input" id="remember" name="remember">
						<label class="form-check-label" for="remember">Remember me</label>
					</div>
					<div class="d-grid">
						<button type="submit" class="btn btn-primary">Log In</button>
					</div>
				</form>

				<hr class="my-4">
				<div class="text-center">
					<small>Don't have an account? <a href="{{ url_for('register') }}">Register</a></small>
				</div>
			</div>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
	</body>
</html>
